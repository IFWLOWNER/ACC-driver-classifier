<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IFWL Flag</title>
  <style>
    html,body{height:100%;margin:0;font-family:system-ui;overflow:hidden;background:transparent;}
    body.purple{
      background: radial-gradient(circle at 25% 20%, #a78bfa 0%, #6d28d9 35%, #2e1065 75%, #120426 100%);
      color:#fff;
    }

    #clearLayer{position:fixed;inset:0;display:none;pointer-events:none;background: rgba(0,0,0,0.001);}
    .wrap{height:100%;display:flex;align-items:center;justify-content:center;padding:18px;}
    .panel{
      width:min(520px, 96vw);
      border-radius:24px;
      border:2px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
      padding: 18px 16px;
      text-align:center;
      color:#fff;
      box-shadow:0 18px 55px rgba(0,0,0,.55);
    }

    .big{font-weight:1000;letter-spacing:.6px;font-size: clamp(26px, 4.2vw, 40px);margin:0 0 8px}
    .sub{margin:0;opacity:.9;font-size: clamp(14px, 2.2vw, 18px);line-height:1.25}
    .stamp{margin-top:10px;font-family: ui-monospace, Menlo, Consolas, monospace;font-size: 12px;opacity:.85}

    @keyframes rfFlash { 0%,49%{background:#000;} 50%,100%{background:#b30000;} }
    @keyframes vscFlash { 0%,49%{background:#000;} 50%,100%{background:#8a5a00;} }
    body.red.flash { animation: rfFlash 1.2s infinite; }
    body.vsc.flash { animation: vscFlash 1.4s infinite; }
    body.red.solid { background:#b30000; }
    body.vsc.solid { background:#8a5a00; }

    body.rtp_solid{ background:#8a5a00; color:#fff; }

    .dot{display:inline-block;width:14px;height:14px;border-radius:999px;margin-right:10px;vertical-align:middle}
    .dot.green{background:#22c55e;}
    .dot.red{background:#ef4444;}
    .dot.yellow{background:#f59e0b;}
    .dot.blue{background:#3b82f6;}
  </style>
</head>
<body>

<!-- 🔊 ADDED: SOUND FILES -->
<audio id="sound_race_checkin" src="race check in final.mp3" preload="auto"></audio>
<audio id="sound_server_reset" src="server restart final.mp3" preload="auto"></audio>
<audio id="sound_vsc" src="VSC ENABLED. FORMATION.mp3" preload="auto"></audio>
<audio id="sound_vsc_end" src="VSC ended.mp3" preload="auto"></audio>
<audio id="sound_vsc_pit" src="VSC PITS REQUESTED.mp3" preload="auto"></audio>
<audio id="sound_red" src="red flag final.mp3" preload="auto"></audio>

<div id="clearLayer"></div>
<div class="wrap" id="wrap">
  <div class="panel" id="panel">
    <div id="content"></div>
  </div>
</div>

<script>

  const WORKER_BASE = "https://ifwl-flag.benjamin-leahy1.workers.dev";
  const POLL_MS = 500;
  const FLASH_MS = 4000;

  const clearLayer = document.getElementById("clearLayer");
  const wrap = document.getElementById("wrap");
  const panel = document.getElementById("panel");
  const content = document.getElementById("content");

  /* 🔊 ADDED: SOUND FUNCTION */
  function playSound(id){
    const el = document.getElementById(id);
    if(!el) return;
    try{
      el.currentTime = 0;
      el.play().catch(()=>{});
    }catch{}
  }

  function fmt(ts){
    try { return new Date(ts).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"}); }
    catch { return "—"; }
  }

  function resetAll(){
    document.body.className = "";
    document.body.style.background = "";
    document.body.style.color = "";
  }

  function showGreenBlank(){
    resetAll();
    wrap.style.display = "none";
    clearLayer.style.display = "block";
  }

  function showUI(){
    clearLayer.style.display = "none";
    wrap.style.display = "flex";
  }

  let flashTimer = null;
  function applyFlash(baseClass){
    if(flashTimer){ clearTimeout(flashTimer); flashTimer = null; }
    document.body.classList.remove("solid","flash");
    document.body.classList.add(baseClass, "flash");
    flashTimer = setTimeout(() => {
      document.body.classList.remove("flash");
      document.body.classList.add("solid");
      flashTimer = null;
    }, FLASH_MS);
  }

  function stopFlash(){
    if(flashTimer){ clearTimeout(flashTimer); flashTimer = null; }
    document.body.classList.remove("flash","solid");
  }

  function getEffectiveMode(data){
    const state = String(data?.state || "green").toLowerCase();
    const lastCommand = String(data?.lastCommand || "").toLowerCase();

    if(state === "return_to_race_pace" || lastCommand === "return_to_race_pace") return "return_to_race_pace";
    if(lastCommand === "server_reset") return "server_reset";
    if(state === "race_checkin") return "race_checkin";
    if(state === "red") return "red";
    if(state === "vsc_slow") return "vsc_slow";
    if(state === "vsc_pit") return "vsc_pit";

    return "green";
  }

  function renderFlagUI(mode){
    resetAll();
    stopFlash();

    let text = "GREEN FLAG";
    let dot = "green";

    if(mode === "red"){
      applyFlash("red");
      text = "RED FLAG";
      dot = "red";
    }
    if(mode === "vsc_slow"){
      applyFlash("vsc");
      text = "VSC — FORMATION";
      dot = "yellow";
    }
    if(mode === "vsc_pit"){
      applyFlash("vsc");
      text = "VSC — PIT NOW";
      dot = "yellow";
    }
    if(mode === "return_to_race_pace"){
      document.body.classList.add("rtp_solid");
      text = "VSC ENDING";
      dot = "yellow";
    }

    content.innerHTML = `
      <div class="big">
        <span class="dot ${dot}"></span>${text}
      </div>
    `;
  }

  let lastKey = null;

  function apply(data){

    const mode = getEffectiveMode(data);
    const key = mode + ":" + (data?.updatedAt || "");

    if(key !== lastKey){

      /* 🔊 ONLY ADDITION */
      switch(mode){
        case "race_checkin": playSound("sound_race_checkin"); break;
        case "server_reset": playSound("sound_server_reset"); break;
        case "vsc_slow": playSound("sound_vsc"); break;
        case "vsc_pit": playSound("sound_vsc_pit"); break;
        case "return_to_race_pace": playSound("sound_vsc_end"); break;
        case "red": playSound("sound_red"); break;
      }

      renderFlagUI(mode);
      lastKey = key;
    }
  }

  function showOffline(){
    showUI();
    resetAll();
    stopFlash();
    content.innerHTML = `
      <div class="big">
        <span class="dot red"></span>FLAG FEED OFFLINE
      </div>
    `;
  }

  async function poll(){
    try{
      const res = await fetch(`${WORKER_BASE}/state?t=${Date.now()}`);
      const data = await res.json();
      apply(data);
    }catch{
      showOffline();
    }
  }

  poll();
  setInterval(poll, POLL_MS);

</script>
</body>
</html>
