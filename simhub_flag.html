<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>IFWL Flag</title>

<!-- YOUR EXISTING HEAD STAYS IDENTICAL -->
<style>
/* (UNCHANGED — your entire CSS stays exactly as-is) */
html,body{height:100%;margin:0;font-family:system-ui;overflow:hidden;background:transparent;}
/* ... KEEP ALL YOUR CSS EXACTLY THE SAME ... */
</style>
</head>

<body>

<!-- 🔊 SOUND FILES (ADDED) -->
<audio id="sound_race_checkin" src="race check in final.mp3" preload="auto"></audio>
<audio id="sound_server_reset" src="server restart final.mp3" preload="auto"></audio>
<audio id="sound_vsc" src="VSC ENABLED. FORMATION.mp3" preload="auto"></audio>
<audio id="sound_vsc_end" src="VSC ended.mp3" preload="auto"></audio>
<audio id="sound_vsc_pit" src="VSC PITS REQUESTED.mp3" preload="auto"></audio>
<audio id="sound_red" src="red flag final.mp3" preload="auto"></audio>

<div id="clearLayer"></div>
<div class="wrap" id="wrap">
  <div class="panel" id="panel">
    <div id="content"></div>
  </div>
</div>

<script>

const WORKER_BASE = "https://ifwl-flag.benjamin-leahy1.workers.dev";
const POLL_MS = 500;
const FLASH_MS = 4000;

const clearLayer = document.getElementById("clearLayer");
const wrap = document.getElementById("wrap");
const panel = document.getElementById("panel");
const content = document.getElementById("content");

function fmt(ts){
  try { return new Date(ts).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"}); }
  catch { return "—"; }
}

function escapeHtml(s){
  return String(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function resetAll(){
  document.body.className = "";
  document.body.style.background = "";
  document.body.style.color = "";
}

function showGreenBlank(){
  resetAll();
  wrap.style.display = "none";
  clearLayer.style.display = "block";
  clearLayer.style.opacity = "0.001";
  requestAnimationFrame(() => { clearLayer.style.opacity = "0.001"; });
}

function showUI(){
  clearLayer.style.display = "none";
  wrap.style.display = "flex";
}

function ensurePanelTextColor(isDarkText){
  if(isDarkText){
    panel.style.color = "#111827";
    panel.style.borderColor = "rgba(17,24,39,.20)";
    panel.style.background = "rgba(255,255,255,.72)";
  }else{
    panel.style.color = "#fff";
    panel.style.borderColor = "rgba(255,255,255,.18)";
    panel.style.background = "rgba(0,0,0,.45)";
  }
}

/* 🔊 SOUND SYSTEM */
function playSound(id){
  const el = document.getElementById(id);
  if(!el) return;
  try{
    el.currentTime = 0;
    el.play().catch(()=>{});
  }catch{}
}

/* FLASH SYSTEM (UNCHANGED) */
let flashTimer = null;
function applyFlash(baseClass){
  if(flashTimer){ clearTimeout(flashTimer); flashTimer = null; }
  document.body.classList.remove("solid","flash");
  document.body.classList.add(baseClass, "flash");
  flashTimer = setTimeout(() => {
    document.body.classList.remove("flash");
    document.body.classList.add("solid");
    flashTimer = null;
  }, FLASH_MS);
}
function stopFlash(){
  if(flashTimer){ clearTimeout(flashTimer); flashTimer = null; }
  document.body.classList.remove("flash","solid");
}

/* (ALL YOUR EXISTING FUNCTIONS REMAIN UNCHANGED HERE) */

/* ========================= */
/* 🔥 APPLY FUNCTION UPDATE  */
/* ========================= */

let lastKey = null;

function apply(data){

  const mode = getEffectiveMode(data);
  const updatedAt = data?.updatedAt || null;

  if(mode === "green"){
    lastKey = "green";
    showGreenBlank();
    return;
  }

  showUI();

  const key = mode + ":" + String(updatedAt || "");

  if(key !== lastKey){

    /* 🔊 PLAY CORRECT SOUND */
    switch(mode){

      case "race_checkin":
        playSound("sound_race_checkin");
        break;

      case "server_reset":
        playSound("sound_server_reset");
        break;

      case "vsc_slow":
        playSound("sound_vsc");
        break;

      case "vsc_pit":
        playSound("sound_vsc_pit");
        break;

      case "return_to_race_pace":
        playSound("sound_vsc_end");
        break;

      case "red":
        playSound("sound_red");
        break;
    }

    /* EXISTING RENDER */
    if(mode === "race_checkin") renderCheckinUI(data);
    else renderFlagUI(mode, updatedAt, data);

    lastKey = key;
  }
}

async function poll(){
  try{
    const res = await fetch(`${WORKER_BASE}/state?t=${Date.now()}`, { cache:"no-store" });
    if(!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    apply(data);
  }catch{
    showOffline();
  }
}

poll();
setInterval(poll, POLL_MS);

</script>
</body>
</html>
