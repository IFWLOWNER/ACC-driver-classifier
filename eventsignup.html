<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>IFWL Event Signup</title>
  <style>
    body {
      font-family: system-ui, Arial;
      background:#0b0f17;
      color:#e6eefc;
      margin:0;
      padding:40px;
    }
    .card {
      max-width:720px;
      margin:0 auto;
      background:#111a2b;
      border:1px solid #22304d;
      border-radius:14px;
      padding:22px;
    }
    button {
      background:#5865F2;
      color:white;
      border:0;
      padding:12px 14px;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }
    button:hover { filter:brightness(1.05); }
    .muted {
      opacity:.8;
      font-size:14px;
      line-height:1.5;
    }
    .status {
      margin-top:14px;
      padding:12px;
      border-radius:10px;
    }
    .ok {
      background:#0f2a1b;
      border:1px solid #1f6b3b;
    }
    .bad {
      background:#2a1414;
      border:1px solid #7a2a2a;
    }
    code {
      background:#0b1220;
      padding:2px 6px;
      border-radius:6px;
    }
  </style>
</head>
<body>
  <div class="card" id="loginCard">
    <h1 style="margin:0 0 6px 0;">IFWL Event Signup</h1>
    <p class="muted" style="margin:0 0 12px 0;">
      Login with Discord to access this page.
    </p>

    <button id="loginBtn">Login with Discord</button>
    <button id="logoutBtn" style="display:none;background:#334155;margin-left:8px;">Logout</button>

    <div id="result" class="status" style="display:none;"></div>

    <p class="muted" style="margin-top:16px;">
      Endpoint:<br/>
      <code id="endpointHint"></code>
    </p>
  </div>

  <main id="eventSignupPage" style="display:none;"></main>

  <script>
    const FUNCTION = "https://europe-west2-ifwl-591d8.cloudfunctions.net/rtGate";
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    document.getElementById("endpointHint").textContent = FUNCTION;

    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const resultBox = document.getElementById("result");
    const eventSignupPage = document.getElementById("eventSignupPage");

    function show(status, ok) {
      resultBox.style.display = "block";
      resultBox.className = "status " + (ok ? "ok" : "bad");
      resultBox.innerHTML = status;
    }

    function setLoggedInUI(isLoggedIn) {
      loginBtn.style.display = isLoggedIn ? "none" : "inline-block";
      logoutBtn.style.display = isLoggedIn ? "inline-block" : "none";
      eventSignupPage.style.display = isLoggedIn ? "block" : "none";
    }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, c =>
        ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c])
      );
    }

    async function startLogin() {
      const startUrl = FUNCTION + `?start=1&redirect=${encodeURIComponent(REDIRECT_URI)}`;
      const r = await fetch(startUrl);
      const data = await r.json();
      if (!data.url) throw new Error(data.error || "No login url returned");
      window.location.href = data.url;
    }

    async function handleCallback() {
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      const error = params.get("error");

      if (error) {
        show(`❌ Discord login error: <b>${escapeHtml(error)}</b>`, false);
        setLoggedInUI(false);
        return;
      }

      if (!code) {
        const existingSession = localStorage.getItem("IFWL_EVENTSIGNUP_SESSION");
        if (existingSession) {
          setLoggedInUI(true);
          show("✅ Logged in with Discord.", true);
        }
        return;
      }

      show("Checking your Discord login…", true);

      const checkUrl =
        FUNCTION +
        `?code=${encodeURIComponent(code)}&redirect=${encodeURIComponent(REDIRECT_URI)}&issue=1`;

      const r = await fetch(checkUrl);
      const data = await r.json();

      history.replaceState({}, document.title, REDIRECT_URI);

      if (data.error) {
        localStorage.removeItem("IFWL_EVENTSIGNUP_SESSION");
        setLoggedInUI(false);
        show(`❌ ${escapeHtml(data.error)}`, false);
        return;
      }

      if (data.sessionToken) {
        localStorage.setItem("IFWL_EVENTSIGNUP_SESSION", data.sessionToken);
      }

      setLoggedInUI(true);
      show(`✅ Logged in with Discord as <b>${escapeHtml(data.username || "user")}</b>.`, true);
    }

    loginBtn.addEventListener("click", () => {
      startLogin().catch(e => show(`❌ ${escapeHtml(e.message || e)}`, false));
    });

    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("IFWL_EVENTSIGNUP_SESSION");
      setLoggedInUI(false);
      show("Logged out.", true);
    });

    handleCallback().catch(e => {
      localStorage.removeItem("IFWL_EVENTSIGNUP_SESSION");
      setLoggedInUI(false);
      show(`❌ ${escapeHtml(e.message || e)}`, false);
    });
  </script>
</body>
</html>
