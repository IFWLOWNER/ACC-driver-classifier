<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFWL Ticket Portal - Off Season</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    /* VIDEO BACKGROUND */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* DARK OVERLAY (optional but recommended) */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: 2;
    }

    /* CENTER IMAGE */
    .content {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .content img {
      max-width: 90%;
      max-height: 80vh;
      object-fit: contain;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.7));
    }
  </style>
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="backgroundvideo.mp4" type="video/mp4">
  </video>

  <!-- DARK OVERLAY -->
  <div class="overlay"></div>

  <!-- FRONT IMAGE -->
  <div class="content">
    <img src="IFWL Season 2 - Pages - WIP (1).png" alt="IFWL Off Season">
  </div>

</body>
</html>
