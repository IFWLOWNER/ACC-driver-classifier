<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFWL Incident Review</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: url('ifwl_bg.webp') no-repeat center center fixed;
    background-size: cover;
  }
</style>
</head>

<body class="text-white font-sans">

<div class="max-w-4xl mx-auto p-4">

  <!-- HEADER -->
  <div class="flex items-center justify-between mb-6">
    <img src="ifwl_logo.png" class="h-12">
    <h1 class="text-2xl font-bold text-center flex-1">IFWL Incident Review</h1>
    <img src="ifwl_logo.png" class="h-12">
  </div>

  <!-- INCIDENT TITLE -->
  <div class="bg-black bg-opacity-70 p-4 rounded-xl mb-6 text-center">
    <h2 id="incidentTitle" class="text-xl font-semibold">Loading Incident...</h2>
  </div>

  <!-- VIDEO -->
  <div class="bg-black bg-opacity-70 p-4 rounded-xl mb-6">
    <iframe id="videoFrame" class="w-full h-64 rounded-lg" src="" allowfullscreen></iframe>
  </div>

  <!-- DESCRIPTION -->
  <div class="bg-black bg-opacity-70 p-4 rounded-xl mb-6">
    <p id="incidentDescription">Loading description...</p>
  </div>

  <!-- VOTING -->
  <div id="voteSection" class="bg-black bg-opacity-70 p-6 rounded-xl text-center mb-6">
    <h3 class="text-lg font-bold mb-4">Who is at fault?</h3>

    <div class="grid gap-3">
      <button onclick="submitVote('accused')" class="bg-red-600 hover:bg-red-700 p-3 rounded-lg font-semibold">
        Accused Driver
      </button>

      <button onclick="submitVote('reporting')" class="bg-blue-600 hover:bg-blue-700 p-3 rounded-lg font-semibold">
        Reporting Driver
      </button>

      <button onclick="submitVote('racing')" class="bg-gray-600 hover:bg-gray-700 p-3 rounded-lg font-semibold">
        Racing Incident (NFA)
      </button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="resultsSection" class="hidden bg-black bg-opacity-70 p-6 rounded-xl mb-6">
    <h3 class="text-lg font-bold mb-4 text-center">Results</h3>

    <div class="mb-3">
      <p>Accused</p>
      <div class="w-full bg-gray-800 rounded">
        <div id="accusedBar" class="bg-red-500 p-1 text-center"></div>
      </div>
    </div>

    <div class="mb-3">
      <p>Reporting</p>
      <div class="w-full bg-gray-800 rounded">
        <div id="reportingBar" class="bg-blue-500 p-1 text-center"></div>
      </div>
    </div>

    <div class="mb-3">
      <p>Racing Incident</p>
      <div class="w-full bg-gray-800 rounded">
        <div id="racingBar" class="bg-gray-500 p-1 text-center"></div>
      </div>
    </div>

    <p class="text-center mt-4" id="totalVotes"></p>
  </div>

  <!-- OFFICIAL RESULT -->
  <div id="officialSection" class="hidden bg-yellow-600 bg-opacity-90 p-4 rounded-xl mb-6 text-center">
    <h3 class="font-bold">Official IFWL Decision</h3>
    <p id="officialDecision"></p>
  </div>

</div>

<script type="module">

// ✅ GOOGLE APPS SCRIPT (PASTE YOUR URL HERE)
const API_URL = "https://script.google.com/macros/s/AKfycbzloWQL5Hr8Hyb8rFDj9Hvagrlc_V2GJeLF9DgBIAJu_-u-LX5VF-hhay9N2k8k4xqlig/exec";

// ✅ FIREBASE IMPORTS
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ✅ YOUR FIREBASE CONFIG (DONE)
const firebaseConfig = {
  apiKey: "AIzaSyDw7lK1obLfMziXFr7gJr5R5huFGjfVcc8",
  authDomain: "ifwl-591d8.firebaseapp.com",
  projectId: "ifwl-591d8",
  storageBucket: "ifwl-591d8.firebasestorage.app",
  messagingSenderId: "703021152109",
  appId: "1:703021152109:web:18e2f6a73e0521e4850c64",
  measurementId: "G-974R4YE6L5"
};

// ✅ INIT FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ GET INCIDENT ID FROM URL
const params = new URLSearchParams(window.location.search);
const incidentId = params.get("id");

// 🔥 LOAD INCIDENT FROM FIREBASE
async function loadIncident() {
  try {
    const docRef = doc(db, "tickets", incidentId);
    const docSnap = await getDoc(docRef);

    if (docSnap.exists()) {
      const data = docSnap.data();

      // TITLE
      document.getElementById("incidentTitle").innerText =
        `${data.event} - ${data.track}`;

      // DESCRIPTION
      document.getElementById("incidentDescription").innerHTML =
  `<span class="block text-sm text-gray-300 mb-2">
    This is the statement provided to IFWL stewards along with the footage. Nothing has been omitted.
  </span>
  <span class="text-white">
    ${data.fullIncident || "No description provided."}
  </span>`;

      // VIDEO (AUTO CONVERT YOUTUBE)
      let videoUrl = data.proofUrl || "";

if (videoUrl.includes("watch?v=")) {
  const videoId = videoUrl.split("v=")[1].split("&")[0];
  videoUrl = `https://www.youtube.com/embed/${videoId}`;
}
else if (videoUrl.includes("youtu.be/")) {
  const videoId = videoUrl.split("youtu.be/")[1].split("?")[0];
  videoUrl = `https://www.youtube.com/embed/${videoId}`;
}

document.getElementById("videoFrame").src = videoUrl;

      // OFFICIAL DECISION
      document.getElementById("officialDecision").innerText =
        data.stewardDecision || "Pending";

    } else {
      document.getElementById("incidentTitle").innerText = "Incident Not Found";
    }

  } catch (err) {
    console.error("Firebase error:", err);
    document.getElementById("incidentTitle").innerText = "Error loading incident";
  }
}

// ✅ SUBMIT VOTE
window.submitVote = function(type){
  if(localStorage.getItem("voted_" + incidentId)) return;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      incidentId: incidentId,
      vote: type
    })
  }).then(() => {
    localStorage.setItem("voted_" + incidentId, true);
    loadResults();
  });
}

// ✅ LOAD RESULTS
function loadResults(){
  fetch(API_URL + "?id=" + incidentId)
  .then(res => res.json())
  .then(data => {

    const total = data.total || 1;

    const accusedPct = Math.round((data.accused / total) * 100);
    const reportingPct = Math.round((data.reporting / total) * 100);
    const racingPct = Math.round((data.racing / total) * 100);

    document.getElementById("voteSection").classList.add("hidden");
    document.getElementById("resultsSection").classList.remove("hidden");
    document.getElementById("officialSection").classList.remove("hidden");

    document.getElementById("accusedBar").style.width = accusedPct + "%";
    document.getElementById("accusedBar").innerText = accusedPct + "%";

    document.getElementById("reportingBar").style.width = reportingPct + "%";
    document.getElementById("reportingBar").innerText = reportingPct + "%";

    document.getElementById("racingBar").style.width = racingPct + "%";
    document.getElementById("racingBar").innerText = racingPct + "%";

    document.getElementById("totalVotes").innerText =
      "Total Votes: " + total;
  });
}

// 🚀 INIT
loadIncident();

if(localStorage.getItem("voted_" + incidentId)){
  loadResults();
}

</script>

</body>
</html>
