<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IFWL Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #111827;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 400px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
            font-size: 14px;
        }

        .loader {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>IFWL Login</h1>
    <p id="status">Completing login...</p>
    <div class="loader">⏳</div>
</div>

<script>
(async () => {
    try {
        const status = document.getElementById("status");

        // Get code from Discord
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        if (!code) {
            status.innerText = "No login code received.";
            return;
        }

        status.innerText = "Contacting IFWL servers...";

        // ✅ MUST MATCH Firebase allowedPaths EXACTLY
        const redirectUri = "https://ifwlowner.github.io/ACC-driver-classifier/appcallback.html";

        // Call Firebase function
        const response = await fetch(
            "https://europe-west2-ifwl-591d8.cloudfunctions.net/rtGate" +
            "?code=" + encodeURIComponent(code) +
            "&redirect=" + encodeURIComponent(redirectUri)
        );

        // ✅ Handle HTTP errors properly
        if (!response.ok) {
            const text = await response.text();
            console.error("Server error:", text);
            status.innerText = "Server error (login failed).";
            return;
        }

        const data = await response.json();

        // Debug output (super useful)
        console.log("Login response:", data);

        if (!data || !data.username) {
            status.innerText = "Login failed (invalid response).";
            return;
        }

        status.innerText = "Logging you into IFWL app...";

        // Build custom protocol URL
        const loginUrl =
            "ifwl://login?" +
            "username=" + encodeURIComponent(data.username) +
            "&nick=" + encodeURIComponent(data.nick || "") +
            "&globalName=" + encodeURIComponent(data.globalName || "");

        // Small delay (helps browser trigger protocol reliably)
        setTimeout(() => {
            window.location.href = loginUrl;
        }, 500);

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText = "Error during login.";
    }
})();
</script>

</body>
</html>
