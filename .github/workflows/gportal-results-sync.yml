name: Sync ACC Console Results

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  sync-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FTP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare local results folders
        run: |
          mkdir -p data/results/console-proam
          mkdir -p data/results/console-beginner
          mkdir -p data/results/console-monday-funday

          echo "Removing old non-race files only..."
          find data/results/console-proam -type f -name "*.json" ! -name "*_R.json" -delete || true
          find data/results/console-beginner -type f -name "*.json" ! -name "*_R.json" -delete || true
          find data/results/console-monday-funday -type f -name "*.json" ! -name "*_R.json" -delete || true

          echo "Existing race result files are being preserved."

      # =========================
      # CONSOLE PRO-AM - G-PORTAL
      # =========================
      - name: Download latest 25 non-race and all race files from Console Pro-Am
        env:
          SERVER_ID: console-proam
          SERVER_NAME: "IFWL | CONSOLE PRO AM SEASON 3"
          FTP_HOST: ${{ secrets.GPORTAL_CONSOLE_PROAM_HOST }}
          FTP_PORT: ${{ secrets.GPORTAL_CONSOLE_PROAM_PORT }}
          FTP_USER: ${{ secrets.GPORTAL_CONSOLE_PROAM_USER }}
          FTP_PASSWORD: ${{ secrets.GPORTAL_CONSOLE_PROAM_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.GPORTAL_CONSOLE_PROAM_RESULTS_PATH }}
        run: |
          echo "Connecting to Console Pro-Am FTP..."
          mkdir -p "data/results/$SERVER_ID"

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > "remote_files_$SERVER_ID.txt"
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

          echo "Selecting all race files and latest 25 non-race files..."

          grep -E "_R\.json$" "remote_files_$SERVER_ID.txt" | sort -r > "race_files_$SERVER_ID.txt" || true
          grep -Ev "_R\.json$" "remote_files_$SERVER_ID.txt" | sort -r | head -n 25 > "latest_nonrace_files_$SERVER_ID.txt" || true

          cat "race_files_$SERVER_ID.txt" "latest_nonrace_files_$SERVER_ID.txt" | awk 'NF' | sort -r | uniq > "download_files_$SERVER_ID.txt"

          echo "Files selected for Console Pro-Am:"
          cat "download_files_$SERVER_ID.txt"

          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Downloading Console Pro-Am file: $file"

              lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          get "$file" -o "data/results/$SERVER_ID/$file"
          bye
          EOF

            fi
          done < "download_files_$SERVER_ID.txt"

      # =============================
      # CONSOLE BEGINNER - G-PORTAL
      # =============================
      - name: Download latest 25 non-race and all race files from Console Beginner
        env:
          SERVER_ID: console-beginner
          SERVER_NAME: "IFWL | CONSOLE BEGINNER SEASON 3"
          FTP_HOST: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_HOST }}
          FTP_PORT: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_PORT }}
          FTP_USER: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_USER }}
          FTP_PASSWORD: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_RESULTS_PATH }}
        run: |
          echo "Connecting to Console Beginner FTP..."
          mkdir -p "data/results/$SERVER_ID"

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > "remote_files_$SERVER_ID.txt"
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

          echo "Selecting all race files and latest 25 non-race files..."

          grep -E "_R\.json$" "remote_files_$SERVER_ID.txt" | sort -r > "race_files_$SERVER_ID.txt" || true
          grep -Ev "_R\.json$" "remote_files_$SERVER_ID.txt" | sort -r | head -n 25 > "latest_nonrace_files_$SERVER_ID.txt" || true

          cat "race_files_$SERVER_ID.txt" "latest_nonrace_files_$SERVER_ID.txt" | awk 'NF' | sort -r | uniq > "download_files_$SERVER_ID.txt"

          echo "Files selected for Console Beginner:"
          cat "download_files_$SERVER_ID.txt"

          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Downloading Console Beginner file: $file"

              lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          get "$file" -o "data/results/$SERVER_ID/$file"
          bye
          EOF

            fi
          done < "download_files_$SERVER_ID.txt"

      # ================================
      # CONSOLE MONDAY FUNDAY - G-PORTAL
      # ================================
      - name: Download latest 25 non-race and all race files from Console Monday Funday
        env:
          SERVER_ID: console-monday-funday
          SERVER_NAME: "IFWL | CONSOLE MONDAY FUNDAY SEASON 3"
          FTP_HOST: ${{ secrets.GPORTAL_MONDAY_FUNDAY_HOST }}
          FTP_PORT: ${{ secrets.GPORTAL_MONDAY_FUNDAY_PORT }}
          FTP_USER: ${{ secrets.GPORTAL_MONDAY_FUNDAY_USER }}
          FTP_PASSWORD: ${{ secrets.GPORTAL_MONDAY_FUNDAY_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.GPORTAL_MONDAY_FUNDAY_RESULTS_PATH }}
        run: |
          echo "Connecting to Console Monday Funday FTP..."
          mkdir -p "data/results/$SERVER_ID"

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > "remote_files_$SERVER_ID.txt"
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

          echo "Selecting all race files and latest 25 non-race files..."

          grep -E "_R\.json$" "remote_files_$SERVER_ID.txt" | sort -r > "race_files_$SERVER_ID.txt" || true
          grep -Ev "_R\.json$" "remote_files_$SERVER_ID.txt" | sort -r | head -n 25 > "latest_nonrace_files_$SERVER_ID.txt" || true

          cat "race_files_$SERVER_ID.txt" "latest_nonrace_files_$SERVER_ID.txt" | awk 'NF' | sort -r | uniq > "download_files_$SERVER_ID.txt"

          echo "Files selected for Console Monday Funday:"
          cat "download_files_$SERVER_ID.txt"

          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Downloading Console Monday Funday file: $file"

              lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          get "$file" -o "data/results/$SERVER_ID/$file"
          bye
          EOF

            fi
          done < "download_files_$SERVER_ID.txt"

      # =========================
      # BUILD MANIFEST
      # =========================
      - name: Build manifest file
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          servers = {
              "console-proam": "IFWL | CONSOLE PRO AM SEASON 3",
              "console-beginner": "IFWL | CONSOLE BEGINNER SEASON 3",
              "console-monday-funday": "IFWL | CONSOLE MONDAY FUNDAY SEASON 3"
          }

          results = []

          for server_id, server_name in servers.items():
              results_dir = Path("data/results") / server_id
              files = sorted(results_dir.glob("*.json"), key=lambda p: p.name, reverse=True)

              for p in files:
                  session_type = "race" if p.name.endswith("_R.json") else "session"

                  results.append({
                      "serverId": server_id,
                      "serverName": server_name,
                      "file": f"data/results/{server_id}/{p.name}",
                      "name": p.name,
                      "sessionKind": session_type
                  })

          manifest = {
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "nonRaceLimitPerServer": 25,
              "raceFilesPreserved": True,
              "servers": [
                  {
                      "serverId": server_id,
                      "serverName": server_name
                  }
                  for server_id, server_name in servers.items()
              ],
              "results": results
          }

          Path("data").mkdir(exist_ok=True)
          Path("data/manifest.json").write_text(
              json.dumps(manifest, indent=2),
              encoding="utf-8"
          )

          race_count = sum(1 for item in results if item["sessionKind"] == "race")
          non_race_count = sum(1 for item in results if item["sessionKind"] != "race")

          print(f"Manifest created with {len(results)} total result files.")
          print(f"Race files preserved/listed: {race_count}")
          print(f"Non-race files listed: {non_race_count}")

          for item in results:
              print(f"- {item['serverName']} / {item['name']}")
          PY

      # =========================
      # COMMIT RESULTS
      # =========================
      - name: Commit latest result files
        run: |
          git config user.name "IFWL Results Bot"
          git config user.email "actions@github.com"

          git add -A data/results data/manifest.json

          if git diff --cached --quiet; then
            echo "No result file changes to commit."
          else
            git commit -m "Update latest ACC console results"
            git push
          fi
