name: Sync ACC Results

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  sync-results:
    runs-on: ubuntu-latest

    env:
      NON_RACE_LIMIT: 15
      RACE_LIMIT: 15

      # Console Pro-Am - G-Portal
      CONSOLE_PROAM_HOST: ${{ secrets.GPORTAL_CONSOLE_PROAM_HOST }}
      CONSOLE_PROAM_PORT: ${{ secrets.GPORTAL_CONSOLE_PROAM_PORT }}
      CONSOLE_PROAM_USER: ${{ secrets.GPORTAL_CONSOLE_PROAM_USER }}
      CONSOLE_PROAM_PASSWORD: ${{ secrets.GPORTAL_CONSOLE_PROAM_PASSWORD }}
      CONSOLE_PROAM_RESULTS_PATH: ${{ secrets.GPORTAL_CONSOLE_PROAM_RESULTS_PATH }}

      # Console Beginner - G-Portal
      CONSOLE_BEGINNER_HOST: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_HOST }}
      CONSOLE_BEGINNER_PORT: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_PORT }}
      CONSOLE_BEGINNER_USER: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_USER }}
      CONSOLE_BEGINNER_PASSWORD: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_PASSWORD }}
      CONSOLE_BEGINNER_RESULTS_PATH: ${{ secrets.GPORTAL_CONSOLE_BEGINNER_RESULTS_PATH }}

      # Console Monday Funday - G-Portal
      CONSOLE_MONDAY_FUNDAY_HOST: ${{ secrets.GPORTAL_MONDAY_FUNDAY_HOST }}
      CONSOLE_MONDAY_FUNDAY_PORT: ${{ secrets.GPORTAL_MONDAY_FUNDAY_PORT }}
      CONSOLE_MONDAY_FUNDAY_USER: ${{ secrets.GPORTAL_MONDAY_FUNDAY_USER }}
      CONSOLE_MONDAY_FUNDAY_PASSWORD: ${{ secrets.GPORTAL_MONDAY_FUNDAY_PASSWORD }}
      CONSOLE_MONDAY_FUNDAY_RESULTS_PATH: ${{ secrets.GPORTAL_MONDAY_FUNDAY_RESULTS_PATH }}

      # PC Pro-Am - Assetto Hosting
      PC_PROAM_HOST: ${{ secrets.ASSETTO_PC_PROAM_HOST }}
      PC_PROAM_PORT: ${{ secrets.ASSETTO_PC_PROAM_PORT }}
      PC_PROAM_USER: ${{ secrets.ASSETTO_PC_PROAM_USER }}
      PC_PROAM_PASSWORD: ${{ secrets.ASSETTO_PC_PROAM_PASSWORD }}
      PC_PROAM_RESULTS_PATH: ${{ secrets.ASSETTO_PC_PROAM_RESULTS_PATH }}

      # PC Beginner - Assetto Hosting
      PC_BEGINNER_HOST: ${{ secrets.ASSETTO_PC_BEGINNER_HOST }}
      PC_BEGINNER_PORT: ${{ secrets.ASSETTO_PC_BEGINNER_PORT }}
      PC_BEGINNER_USER: ${{ secrets.ASSETTO_PC_BEGINNER_USER }}
      PC_BEGINNER_PASSWORD: ${{ secrets.ASSETTO_PC_BEGINNER_PASSWORD }}
      PC_BEGINNER_RESULTS_PATH: ${{ secrets.ASSETTO_PC_BEGINNER_RESULTS_PATH }}

      # PC Monday Funday - Assetto Hosting
      PC_MONDAY_FUNDAY_HOST: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_HOST }}
      PC_MONDAY_FUNDAY_PORT: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_PORT }}
      PC_MONDAY_FUNDAY_USER: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_USER }}
      PC_MONDAY_FUNDAY_PASSWORD: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_PASSWORD }}
      PC_MONDAY_FUNDAY_RESULTS_PATH: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_RESULTS_PATH }}

      # ✅ ADDED: PC Licence (Qualification server) - Assetto Hosting
      PC_LICENCE_HOST: ${{ secrets.ASSETTO_PC_LICENCE_HOST }}
      PC_LICENCE_PORT: ${{ secrets.ASSETTO_PC_LICENCE_PORT }}
      PC_LICENCE_USER: ${{ secrets.ASSETTO_PC_LICENCE_USER }}
      PC_LICENCE_PASSWORD: ${{ secrets.ASSETTO_PC_LICENCE_PASSWORD }}
      PC_LICENCE_RESULTS_PATH: ${{ secrets.ASSETTO_PC_LICENCE_RESULTS_PATH }}

      # ✅ ADDED: Console Licence (Qualification server) - G-Portal
      CONSOLE_LICENCE_HOST: ${{ secrets.GPORTAL_CONSOLE_LICENCE_HOST }}
      CONSOLE_LICENCE_PORT: ${{ secrets.GPORTAL_CONSOLE_LICENCE_PORT }}
      CONSOLE_LICENCE_USER: ${{ secrets.GPORTAL_CONSOLE_LICENCE_USER }}
      CONSOLE_LICENCE_PASSWORD: ${{ secrets.GPORTAL_CONSOLE_LICENCE_PASSWORD }}
      CONSOLE_LICENCE_RESULTS_PATH: ${{ secrets.GPORTAL_CONSOLE_LICENCE_RESULTS_PATH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FTP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare result folders
        run: |
          mkdir -p data/results/console-proam
          mkdir -p data/results/console-beginner
          mkdir -p data/results/console-monday-funday
          mkdir -p data/results/pc-proam
          mkdir -p data/results/pc-beginner
          mkdir -p data/results/pc-monday-funday
          mkdir -p data/results/pc-licence
          mkdir -p data/results/console-licence

          echo "Removing old non-race files only. Race files are preserved."

          find data/results/console-proam -type f -name "*.json" ! -name "*_R.json" -delete || true
          find data/results/console-beginner -type f -name "*.json" ! -name "*_R.json" -delete || true
          find data/results/console-monday-funday -type f -name "*.json" ! -name "*_R.json" -delete || true
          find data/results/pc-proam -type f -name "*.json" ! -name "*_R.json" -delete || true
          find data/results/pc-beginner -type f -name "*.json" ! -name "*_R.json" -delete || true
          find data/results/pc-monday-funday -type f -name "*.json" ! -name "*_R.json" -delete || true

          # ✅ ADDED: pc-licence and console-licence are deliberately excluded from
          # the deletion above. These are the qualification servers - every lap a
          # driver ever sets here counts toward their total, so nothing (race OR
          # practice/quali) is ever pruned for either folder, unlike every server above.
          echo "pc-licence / console-licence: no files deleted (qualification servers - everything kept forever)."

      - name: Download latest ACC results from all servers
        run: |
          download_server () {
            SERVER_ID="$1"
            SERVER_NAME="$2"
            FTP_HOST="$3"
            FTP_PORT="$4"
            FTP_USER="$5"
            FTP_PASSWORD="$6"
            FTP_RESULTS_PATH="$7"

            echo ""
            echo "======================================="
            echo "Syncing: $SERVER_NAME"
            echo "Folder: data/results/$SERVER_ID"
            echo "======================================="

            mkdir -p "data/results/$SERVER_ID"

            # Note: fail-exit is intentionally NOT set on this listing session. If a
            # single server is briefly unreachable, we want to log it and move on to
            # the next server rather than aborting the whole scheduled run.
            lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > "remote_files_$SERVER_ID.txt" || true
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

            echo "Remote JSON file count:"
            wc -l "remote_files_$SERVER_ID.txt" || true

            if [ ! -s "remote_files_$SERVER_ID.txt" ]; then
              echo "No files listed for $SERVER_NAME (server may be temporarily unreachable). Skipping this server for this run."
              return 0
            fi

            echo "Selecting latest $RACE_LIMIT race files and latest $NON_RACE_LIMIT practice/quali files."

            grep -E "_R\.json$" "remote_files_$SERVER_ID.txt" > "all_race_files_$SERVER_ID.txt" || true
            sort -r "all_race_files_$SERVER_ID.txt" > "all_race_files_sorted_$SERVER_ID.txt" || true
            head -n "$RACE_LIMIT" "all_race_files_sorted_$SERVER_ID.txt" > "race_files_$SERVER_ID.txt" || true

            grep -E "_(FP|Q)\.json$" "remote_files_$SERVER_ID.txt" > "all_nonrace_files_$SERVER_ID.txt" || true
            sort -r "all_nonrace_files_$SERVER_ID.txt" > "all_nonrace_files_sorted_$SERVER_ID.txt" || true
            head -n "$NON_RACE_LIMIT" "all_nonrace_files_sorted_$SERVER_ID.txt" > "nonrace_files_$SERVER_ID.txt" || true

            cat "race_files_$SERVER_ID.txt" "nonrace_files_$SERVER_ID.txt" | awk 'NF' | sort -r | uniq > "download_files_$SERVER_ID.txt"

            echo "Files selected for $SERVER_NAME:"
            cat "download_files_$SERVER_ID.txt"

            echo "Total selected:"
            wc -l "download_files_$SERVER_ID.txt"

            if [ ! -s "download_files_$SERVER_ID.txt" ]; then
              echo "Nothing new to download for $SERVER_NAME."
              return 0
            fi

            # Single FTP session per server instead of one brand-new connection per
            # file. With up to 30 files per server across 6 servers, the old
            # one-connection-per-file approach could open ~300 separate FTP sessions
            # in one run, which is the main reason the whole workflow took around ten
            # minutes. mget pulls every selected file for this server in one session.
            # fail-exit is intentionally left off here too, so one missing/renamed
            # file on the remote server can't wipe out the rest of this server's
            # batch (or abort the whole workflow) - lftp logs it and carries on.
            MGET_ARGS=$(awk '{printf "%s ", $0}' "download_files_$SERVER_ID.txt")

            lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF || echo "Warning: one or more files failed to download for $SERVER_NAME, continuing."
          set ftp:ssl-allow no
          set xfer:clobber yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          lcd "data/results/$SERVER_ID"
          mget $MGET_ARGS
          bye
          EOF
          }

          download_server "console-proam" "IFWL | CONSOLE PRO AM SEASON 3" "$CONSOLE_PROAM_HOST" "$CONSOLE_PROAM_PORT" "$CONSOLE_PROAM_USER" "$CONSOLE_PROAM_PASSWORD" "$CONSOLE_PROAM_RESULTS_PATH" || true

          download_server "console-beginner" "IFWL | CONSOLE BEGINNER SEASON 3" "$CONSOLE_BEGINNER_HOST" "$CONSOLE_BEGINNER_PORT" "$CONSOLE_BEGINNER_USER" "$CONSOLE_BEGINNER_PASSWORD" "$CONSOLE_BEGINNER_RESULTS_PATH" || true

          download_server "console-monday-funday" "IFWL | CONSOLE MONDAY FUNDAY SEASON 3" "$CONSOLE_MONDAY_FUNDAY_HOST" "$CONSOLE_MONDAY_FUNDAY_PORT" "$CONSOLE_MONDAY_FUNDAY_USER" "$CONSOLE_MONDAY_FUNDAY_PASSWORD" "$CONSOLE_MONDAY_FUNDAY_RESULTS_PATH" || true

          download_server "pc-proam" "IFWL | PC PRO AM SEASON 3" "$PC_PROAM_HOST" "$PC_PROAM_PORT" "$PC_PROAM_USER" "$PC_PROAM_PASSWORD" "$PC_PROAM_RESULTS_PATH" || true

          download_server "pc-beginner" "IFWL | PC BEGINNER SEASON 3" "$PC_BEGINNER_HOST" "$PC_BEGINNER_PORT" "$PC_BEGINNER_USER" "$PC_BEGINNER_PASSWORD" "$PC_BEGINNER_RESULTS_PATH" || true

          download_server "pc-monday-funday" "IFWL | PC MONDAY FUNDAY SEASON 3" "$PC_MONDAY_FUNDAY_HOST" "$PC_MONDAY_FUNDAY_PORT" "$PC_MONDAY_FUNDAY_USER" "$PC_MONDAY_FUNDAY_PASSWORD" "$PC_MONDAY_FUNDAY_RESULTS_PATH" || true

          # ✅ ADDED: PC Licence qualification server
          download_server "pc-licence" "IFWL | PC LICENCE" "$PC_LICENCE_HOST" "$PC_LICENCE_PORT" "$PC_LICENCE_USER" "$PC_LICENCE_PASSWORD" "$PC_LICENCE_RESULTS_PATH" || true

          # ✅ ADDED: Console Licence qualification server
          download_server "console-licence" "IFWL | CONSOLE LICENCE" "$CONSOLE_LICENCE_HOST" "$CONSOLE_LICENCE_PORT" "$CONSOLE_LICENCE_USER" "$CONSOLE_LICENCE_PASSWORD" "$CONSOLE_LICENCE_RESULTS_PATH" || true

      - name: Build manifest file
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          servers = {
              "console-proam": "IFWL | CONSOLE PRO AM SEASON 3",
              "console-beginner": "IFWL | CONSOLE BEGINNER SEASON 3",
              "console-monday-funday": "IFWL | CONSOLE MONDAY FUNDAY SEASON 3",
              "pc-proam": "IFWL | PC PRO AM SEASON 3",
              "pc-beginner": "IFWL | PC BEGINNER SEASON 3",
              "pc-monday-funday": "IFWL | PC MONDAY FUNDAY SEASON 3",
              # ✅ ADDED: without this, files would still download into
              # data/results/pc-licence/ but never appear in manifest.json,
              # which means the website would never see them at all.
              "pc-licence": "IFWL | PC LICENCE",
              "console-licence": "IFWL | CONSOLE LICENCE"
          }

          results = []

          for server_id, server_name in servers.items():
              results_dir = Path("data/results") / server_id
              files = sorted(
                  results_dir.glob("*.json"),
                  key=lambda p: p.name,
                  reverse=True
              )

              for p in files:
                  session_type = "race" if p.name.endswith("_R.json") else "session"

                  results.append({
                      "serverId": server_id,
                      "serverName": server_name,
                      "file": f"data/results/{server_id}/{p.name}",
                      "name": p.name,
                      "sessionKind": session_type
                  })

          manifest = {
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "syncIntervalMinutes": 30,
              "nonRaceLimitPerServer": 15,
              "raceLimitDownloadedPerRun": 15,
              "raceFilesPreserved": True,
              "servers": [
                  {
                      "serverId": server_id,
                      "serverName": server_name
                  }
                  for server_id, server_name in servers.items()
              ],
              "results": results
          }

          Path("data").mkdir(exist_ok=True)
          Path("data/manifest.json").write_text(
              json.dumps(manifest, indent=2),
              encoding="utf-8"
          )

          race_count = sum(1 for item in results if item["sessionKind"] == "race")
          non_race_count = sum(1 for item in results if item["sessionKind"] != "race")

          print(f"Manifest created with {len(results)} total files.")
          print(f"Race files listed: {race_count}")
          print(f"Non-race files listed: {non_race_count}")

          for server_id, server_name in servers.items():
              count = sum(1 for item in results if item["serverId"] == server_id)
              races = sum(1 for item in results if item["serverId"] == server_id and item["sessionKind"] == "race")
              non_races = count - races
              print(f"{server_name}: {count} files ({races} race, {non_races} non-race)")

          for item in results:
              print(f"- {item['serverName']} / {item['name']}")
          PY

      - name: Commit latest result files
        run: |
          git config user.name "IFWL Results Bot"
          git config user.email "actions@github.com"

          git add -A data/results data/manifest.json

          if git diff --cached --quiet; then
            echo "No result file changes to commit."
          else
            git commit -m "Update ACC results from all servers"

            # ✅ FIXED: the remote can move on between this job checking out
            # the repo and this step pushing - an overlapping scheduled run,
            # or literally any other push to main in that window - which
            # makes a plain "git push" get rejected as a non-fast-forward.
            # Pulling with rebase first replays this run's commit on top of
            # whatever's newest, so a simple remote update no longer fails
            # the whole job. Retries a few times in case of continued
            # contention (e.g. two runs finishing at nearly the same time).
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git pull --rebase origin main && git push origin main; then
                pushed=true
                break
              fi
              echo "Push attempt $attempt failed (likely remote moved on) - retrying in 5s..."
              sleep 5
            done

            if [ "$pushed" != "true" ]; then
              echo "::error::Could not push after 5 attempts - remote kept moving. Failing so this is visible rather than silently dropping this run's results."
              exit 1
            fi
          fi
