name: Test PC Pro-Am ACC Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-pc-proam:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FTP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: List PC Pro-Am FTP folder
        env:
          FTP_HOST: ${{ secrets.ASSETTO_PC_PROAM_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_PROAM_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_PROAM_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_PROAM_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.ASSETTO_PC_PROAM_RESULTS_PATH }}
        run: |
          echo "Connecting to PC Pro-Am FTP..."
          echo "Expected path from secret: $FTP_RESULTS_PATH"

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > pc_proam_ftp_list.txt
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          pwd
          cls -1 *.json
          bye
          EOF

          echo "===== FIRST 80 JSON FILES FOUND ====="
          head -n 80 pc_proam_ftp_list.txt

          echo "===== LATEST RACE FILES FOUND ====="
          grep -E "_R\.json$" pc_proam_ftp_list.txt | sort -r | head -n 25 || true

          echo "===== LATEST PRACTICE / QUALI FILES FOUND ====="
          grep -E "_(FP|Q)\.json$" pc_proam_ftp_list.txt | sort -r | head -n 25 || true

      - name: Download latest 25 race and latest 25 practice/quali from PC Pro-Am
        env:
          SERVER_ID: pc-proam
          SERVER_NAME: "IFWL | PC PRO AM SEASON 3"
          FTP_HOST: ${{ secrets.ASSETTO_PC_PROAM_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_PROAM_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_PROAM_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_PROAM_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.ASSETTO_PC_PROAM_RESULTS_PATH }}
        run: |
          echo "Downloading limited PC Pro-Am results only..."
          echo "Using path: $FTP_RESULTS_PATH"

          rm -rf data/results/pc-proam
          mkdir -p data/results/pc-proam

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > remote_files_pc_proam.txt
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

          echo "Selecting latest 25 race files and latest 25 practice/quali files only..."

          grep -E "_R\.json$" remote_files_pc_proam.txt | sort -r | head -n 25 > race_files_pc_proam.txt || true
          grep -E "_(FP|Q)\.json$" remote_files_pc_proam.txt | sort -r | head -n 25 > session_files_pc_proam.txt || true

          cat race_files_pc_proam.txt session_files_pc_proam.txt | awk 'NF' | sort -r | uniq > download_files_pc_proam.txt

          echo "Files selected for download:"
          cat download_files_pc_proam.txt

          echo "Total files selected:"
          wc -l download_files_pc_proam.txt

          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Downloading PC Pro-Am file: $file"

              lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          get "$file" -o "data/results/pc-proam/$file"
          bye
          EOF

            fi
          done < download_files_pc_proam.txt

      - name: Build PC Pro-Am only manifest
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          server_id = "pc-proam"
          server_name = "IFWL | PC PRO AM SEASON 3"

          results_dir = Path("data/results") / server_id
          files = sorted(results_dir.glob("*.json"), key=lambda p: p.name, reverse=True)

          results = []

          for p in files:
              session_type = "race" if p.name.endswith("_R.json") else "session"

              results.append({
                  "serverId": server_id,
                  "serverName": server_name,
                  "file": f"data/results/{server_id}/{p.name}",
                  "name": p.name,
                  "sessionKind": session_type
              })

          manifest = {
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "raceLimitForTest": 25,
              "nonRaceLimitForTest": 25,
              "servers": [
                  {
                      "serverId": server_id,
                      "serverName": server_name
                  }
              ],
              "results": results
          }

          Path("data").mkdir(exist_ok=True)
          Path("data/manifest.json").write_text(
              json.dumps(manifest, indent=2),
              encoding="utf-8"
          )

          race_count = sum(1 for item in results if item["sessionKind"] == "race")
          non_race_count = sum(1 for item in results if item["sessionKind"] != "race")

          print(f"PC Pro-Am manifest created with {len(results)} files.")
          print(f"Race files: {race_count}")
          print(f"Practice/quali files: {non_race_count}")

          for item in results:
              print(f"- {item['name']}")
          PY

      - name: Commit PC Pro-Am test results
        run: |
          git config user.name "IFWL Results Bot"
          git config user.email "actions@github.com"

          git add -A data/results/pc-proam data/manifest.json

          if git diff --cached --quiet; then
            echo "No PC Pro-Am result file changes to commit."
          else
            git commit -m "Test limited PC Pro-Am ACC results sync"
            git push
          fi
