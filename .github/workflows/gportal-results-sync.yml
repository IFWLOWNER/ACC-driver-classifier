name: Test PC ACC Results - 2 Each

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-pc-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FTP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Clear PC test folders
        run: |
          rm -rf data/results/pc-proam
          rm -rf data/results/pc-beginner
          rm -rf data/results/pc-monday-funday

          mkdir -p data/results/pc-proam
          mkdir -p data/results/pc-beginner
          mkdir -p data/results/pc-monday-funday

      # =========================
      # PC PRO-AM
      # =========================
      - name: Download latest 2 from PC Pro-Am
        env:
          SERVER_ID: pc-proam
          SERVER_NAME: "IFWL | PC PRO AM SEASON 3"
          FTP_HOST: ${{ secrets.ASSETTO_PC_PROAM_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_PROAM_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_PROAM_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_PROAM_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.ASSETTO_PC_PROAM_RESULTS_PATH }}
        run: |
          echo "Connecting to PC Pro-Am FTP..."
          echo "Using path: $FTP_RESULTS_PATH"

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > "remote_files_$SERVER_ID.txt"
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

          echo "Selecting latest 2 PC Pro-Am result files..."
          grep -E "_(FP|Q|R)\.json$" "remote_files_$SERVER_ID.txt" | sort -r | head -n 2 > "download_files_$SERVER_ID.txt" || true

          echo "Files selected:"
          cat "download_files_$SERVER_ID.txt"

          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Downloading PC Pro-Am file: $file"

              lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          get "$file" -o "data/results/$SERVER_ID/$file"
          bye
          EOF

            fi
          done < "download_files_$SERVER_ID.txt"

      # =========================
      # PC BEGINNER
      # =========================
      - name: Download latest 2 from PC Beginner
        env:
          SERVER_ID: pc-beginner
          SERVER_NAME: "IFWL | PC BEGINNER SEASON 3"
          FTP_HOST: ${{ secrets.ASSETTO_PC_BEGINNER_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_BEGINNER_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_BEGINNER_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_BEGINNER_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.ASSETTO_PC_BEGINNER_RESULTS_PATH }}
        run: |
          echo "Connecting to PC Beginner FTP..."
          echo "Using path: $FTP_RESULTS_PATH"

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > "remote_files_$SERVER_ID.txt"
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

          echo "Selecting latest 2 PC Beginner result files..."
          grep -E "_(FP|Q|R)\.json$" "remote_files_$SERVER_ID.txt" | sort -r | head -n 2 > "download_files_$SERVER_ID.txt" || true

          echo "Files selected:"
          cat "download_files_$SERVER_ID.txt"

          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Downloading PC Beginner file: $file"

              lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          get "$file" -o "data/results/$SERVER_ID/$file"
          bye
          EOF

            fi
          done < "download_files_$SERVER_ID.txt"

      # =========================
      # PC MONDAY FUNDAY
      # =========================
      - name: Download latest 2 from PC Monday Funday
        env:
          SERVER_ID: pc-monday-funday
          SERVER_NAME: "IFWL | PC MONDAY FUNDAY SEASON 3"
          FTP_HOST: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.ASSETTO_PC_MONDAY_FUNDAY_RESULTS_PATH }}
        run: |
          echo "Connecting to PC Monday Funday FTP..."
          echo "Using path: $FTP_RESULTS_PATH"

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > "remote_files_$SERVER_ID.txt"
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

          echo "Selecting latest 2 PC Monday Funday result files..."
          grep -E "_(FP|Q|R)\.json$" "remote_files_$SERVER_ID.txt" | sort -r | head -n 2 > "download_files_$SERVER_ID.txt" || true

          echo "Files selected:"
          cat "download_files_$SERVER_ID.txt"

          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Downloading PC Monday Funday file: $file"

              lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          get "$file" -o "data/results/$SERVER_ID/$file"
          bye
          EOF

            fi
          done < "download_files_$SERVER_ID.txt"

      # =========================
      # BUILD TEST MANIFEST
      # =========================
      - name: Build PC test manifest
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          servers = {
              "pc-proam": "IFWL | PC PRO AM SEASON 3",
              "pc-beginner": "IFWL | PC BEGINNER SEASON 3",
              "pc-monday-funday": "IFWL | PC MONDAY FUNDAY SEASON 3"
          }

          results = []

          for server_id, server_name in servers.items():
              results_dir = Path("data/results") / server_id
              files = sorted(results_dir.glob("*.json"), key=lambda p: p.name, reverse=True)

              for p in files:
                  session_type = "race" if p.name.endswith("_R.json") else "session"

                  results.append({
                      "serverId": server_id,
                      "serverName": server_name,
                      "file": f"data/results/{server_id}/{p.name}",
                      "name": p.name,
                      "sessionKind": session_type
                  })

          manifest = {
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "testLimitPerServer": 2,
              "servers": [
                  {
                      "serverId": server_id,
                      "serverName": server_name
                  }
                  for server_id, server_name in servers.items()
              ],
              "results": results
          }

          Path("data").mkdir(exist_ok=True)
          Path("data/manifest.json").write_text(
              json.dumps(manifest, indent=2),
              encoding="utf-8"
          )

          print(f"PC test manifest created with {len(results)} total files.")

          for server_id, server_name in servers.items():
              count = sum(1 for item in results if item["serverId"] == server_id)
              print(f"{server_name}: {count} files")

          for item in results:
              print(f"- {item['serverName']} / {item['name']}")
          PY

      # =========================
      # COMMIT TEST RESULTS
      # =========================
      - name: Commit PC test results
        run: |
          git config user.name "IFWL Results Bot"
          git config user.email "actions@github.com"

          git add -A data/results/pc-proam data/results/pc-beginner data/results/pc-monday-funday data/manifest.json

          if git diff --cached --quiet; then
            echo "No PC test result file changes to commit."
          else
            git commit -m "Test PC ACC results sync"
            git push
          fi
