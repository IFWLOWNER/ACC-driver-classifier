name: Test PC Pro-Am ACC Results

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-pc-proam:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FTP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      # ======================================
      # TEST 1 - SHOW WHAT THE FTP CAN SEE
      # ======================================
      - name: List PC Pro-Am FTP root
        env:
          FTP_HOST: ${{ secrets.ASSETTO_PC_PROAM_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_PROAM_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_PROAM_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_PROAM_PASSWORD }}
        run: |
          echo "Listing PC Pro-Am FTP root..."

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > pc_ftp_root.txt
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 2
          pwd
          cls -la
          find .
          bye
          EOF

          echo "===== FTP ROOT OUTPUT ====="
          cat pc_ftp_root.txt

          echo "===== POSSIBLE RESULTS FOLDERS ====="
          grep -i "results" pc_ftp_root.txt || true

          echo "===== POSSIBLE SERVER FOLDERS ====="
          grep -i "server" pc_ftp_root.txt || true

      # ======================================
      # TEST 2 - READ README IF PRESENT
      # ======================================
      - name: Read PC Pro-Am FTP README
        env:
          FTP_HOST: ${{ secrets.ASSETTO_PC_PROAM_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_PROAM_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_PROAM_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_PROAM_PASSWORD }}
        run: |
          echo "Trying to read Server Manager README.txt..."

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 2
          cat "Server Manager README.txt"
          bye
          EOF

      # ======================================
      # TEST 3 - TRY COMMON RESULT PATHS
      # ======================================
      - name: Test common PC Pro-Am result paths
        env:
          FTP_HOST: ${{ secrets.ASSETTO_PC_PROAM_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_PROAM_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_PROAM_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_PROAM_PASSWORD }}
        run: |
          echo "Testing common Assetto Hosting result paths..."

          PATHS=(
            "."
            "results"
            "/results"
            "server_0/results"
            "servers/server_0/results"
            "server_manager/servers/server_0/results"
            "/server_manager/servers/server_0/results"
            "server/_manager/servers/server_0/results"
            "/server/_manager/servers/server_0/results"
            "server_manager"
            "servers"
            "server_0"
          )

          for TEST_PATH in "${PATHS[@]}"; do
            echo ""
            echo "===== TESTING PATH: $TEST_PATH ====="

            lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF || true
          set ftp:ssl-allow no
          set net:timeout 15
          set net:max-retries 1
          cd "$TEST_PATH"
          pwd
          cls -la
          cls -1 *.json
          bye
          EOF

          done

      # ======================================
      # TEST 4 - TRY DOWNLOADING FROM SECRET PATH
      # ======================================
      - name: Download latest 25 from PC Pro-Am secret path
        continue-on-error: true
        env:
          SERVER_ID: pc-proam
          SERVER_NAME: "IFWL | PC PRO AM SEASON 3"
          FTP_HOST: ${{ secrets.ASSETTO_PC_PROAM_HOST }}
          FTP_PORT: ${{ secrets.ASSETTO_PC_PROAM_PORT }}
          FTP_USER: ${{ secrets.ASSETTO_PC_PROAM_USER }}
          FTP_PASSWORD: ${{ secrets.ASSETTO_PC_PROAM_PASSWORD }}
          FTP_RESULTS_PATH: ${{ secrets.ASSETTO_PC_PROAM_RESULTS_PATH }}
        run: |
          echo "Trying configured PC Pro-Am results path..."
          echo "Path from secret: $FTP_RESULTS_PATH"

          rm -rf data/results/pc-proam
          mkdir -p data/results/pc-proam

          lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF > remote_files_pc_proam.txt
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          cls -1 *.json
          bye
          EOF

          sort -r remote_files_pc_proam.txt | head -n 25 > latest_files_pc_proam.txt

          echo "Latest PC Pro-Am files selected:"
          cat latest_files_pc_proam.txt

          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "Downloading PC Pro-Am file: $file"

              lftp -u "$FTP_USER","$FTP_PASSWORD" -p "$FTP_PORT" "$FTP_HOST" <<EOF
          set ftp:ssl-allow no
          set cmd:fail-exit yes
          set net:timeout 30
          set net:max-retries 2
          cd "$FTP_RESULTS_PATH"
          get "$file" -o "data/results/pc-proam/$file"
          bye
          EOF

            fi
          done < latest_files_pc_proam.txt

      # ======================================
      # TEST 5 - BUILD PC-ONLY MANIFEST
      # ======================================
      - name: Build PC Pro-Am only manifest
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          server_id = "pc-proam"
          server_name = "IFWL | PC PRO AM SEASON 3"
          results_dir = Path("data/results") / server_id
          files = sorted(results_dir.glob("*.json"), key=lambda p: p.name, reverse=True)

          manifest = {
              "updatedAt": datetime.now(timezone.utc).isoformat(),
              "limitPerServer": 25,
              "servers": [
                  {
                      "serverId": server_id,
                      "serverName": server_name
                  }
              ],
              "results": [
                  {
                      "serverId": server_id,
                      "serverName": server_name,
                      "file": f"data/results/{server_id}/{p.name}",
                      "name": p.name
                  }
                  for p in files
              ]
          }

          Path("data").mkdir(exist_ok=True)
          Path("data/manifest.json").write_text(
              json.dumps(manifest, indent=2),
              encoding="utf-8"
          )

          print(f"PC Pro-Am manifest created with {len(files)} files.")
          for p in files:
              print(f"- {p.name}")
          PY

      # ======================================
      # TEST 6 - COMMIT IF FILES FOUND
      # ======================================
      - name: Commit PC Pro-Am test results
        run: |
          git config user.name "IFWL Results Bot"
          git config user.email "actions@github.com"

          git add -A data/results/pc-proam data/manifest.json

          if git diff --cached --quiet; then
            echo "No PC Pro-Am result file changes to commit."
          else
            git commit -m "Test PC Pro-Am ACC results sync"
            git push
          fi
